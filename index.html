<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бронирование столов — Barr Burgerr</title>
    <style>
        /* Общие стили оформления страницы */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .booking-container {
            max-width: 900px;
            width: 100%;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            box-sizing: border-box;
        }

        h2 {
            margin-top: 0;
            color: #ffffff;
            font-size: 24px;
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
        }

        .step-title {
            text-align: left;
            font-size: 18px;
            color: #f1c40f;
            margin-top: 20px;
            margin-bottom: 10px;
        }

        /* Поля выбора даты и времени */
        .datetime-picker {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            justify-content: space-between;
        }

        .input-group {
            flex: 1;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #aaa;
        }

        input, select, button {
            width: 100%;
            padding: 12px;
            border: 1px solid #333;
            border-radius: 6px;
            background: #2d2d2d;
            color: #fff;
            box-sizing: border-box;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            border-color: #f1c40f;
            box-shadow: 0 0 5px rgba(241, 196, 15, 0.3);
        }

        /* Контейнер интерактивной карты зала */
        .hall-schema {
            position: relative;
            width: 800px;
            height: 752px;
            margin: 20px auto;
            background-image: url('reserv.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            border: 2px solid #333;
            border-radius: 8px;
            background-color: #1a1a1a;
            transition: opacity 0.3s ease;
        }

        /* Стиль для заблокированной карты, если время не выбрано */
        .hall-schema.locked {
            opacity: 0.4;
        }

        /* Базовые стили для кнопок-столов */
        .table {
            position: absolute;
            border: 2px dashed transparent;
            cursor: pointer;
            background-color: rgba(46, 204, 113, 0.15);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: transparent;
        }

        /* Подсветка стола при наведении */
        .table.available:hover {
            background-color: rgba(46, 204, 113, 0.4);
            border-color: #2ecc71;
        }

        /* Выбранный пользователем стол */
        .table.selected {
            background-color: rgba(241, 196, 15, 0.5) !important;
            border-color: #f1c40f !important;
            box-shadow: 0 0 15px rgba(241, 196, 15, 0.6);
        }

        /* Занятый стол */
        .table.occupied {
            background-color: rgba(231, 76, 60, 0.5) !important;
            border-color: #e74c3c !important;
            cursor: not-allowed;
        }

        /* ТОЧНЫЕ КООРДИНАТЫ СТОЛОВ */
        #table-1  { top: 60.5%;  left: 15.6%; width: 9%;   height: 9.5%;  border-radius: 6px; }
        #table-2  { top: 6.5%;   left: 44.5%; width: 7.2%; height: 12.8%; border-radius: 30px; }
        #table-3  { top: 6.5%;   left: 63.8%; width: 7.2%; height: 12.8%; border-radius: 30px; }
        #table-4  { top: 6.5%;   left: 78.2%; width: 7.2%; height: 12.8%; border-radius: 30px; }
        #table-9  { top: 30.1%;  left: 54.2%; width: 10.8%;height: 11.5%; border-radius: 6px; }
        #table-5  { top: 30.1%;  left: 78.2%; width: 10.8%;height: 11.5%; border-radius: 6px; }
        #table-8  { top: 60.5%;  left: 54.2%; width: 10.8%;height: 11.5%; border-radius: 6px; }
        #table-6  { top: 60.5%;  left: 78.2%; width: 10.8%;height: 11.5%; border-radius: 6px; }
        #table-10 { top: 81.5%;  left: 19.8%; width: 26.5%;height: 8.5%;  border-radius: 6px; }
        #table-7  { top: 83.1%;  left: 73.3%; width: 7.2%; height: 12.8%; border-radius: 30px; }

        /* Форма ввода контактов */
        .booking-form {
            display: none;
            margin-top: 30px;
            padding: 20px;
            background: #252525;
            border-radius: 8px;
            border-left: 4px solid #f1c40f;
            text-align: left;
        }

        .booking-form h3 {
            margin-top: 0;
            color: #fff;
            font-size: 18px;
        }

        .submit-btn {
            background-color: #2ecc71;
            color: #fff;
            font-weight: bold;
            border: none;
            cursor: pointer;
            margin-top: 15px;
        }

        .submit-btn:hover {
            background-color: #27ae60;
        }

        @media (max-width: 840px) {
            .hall-schema {
                transform: scale(0.7);
                transform-origin: top center;
                margin-bottom: -220px;
            }
        }
        @media (max-width: 600px) {
            .hall-schema {
                transform: scale(0.45);
                transform-origin: top center;
                margin-bottom: -400px;
            }
            .datetime-picker {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>

<div class="booking-container">
    <h2>Бронирование столов в Barr Burgerr</h2>
    
    <!-- ШАГ 1: Ввод даты и времени -->
    <div class="step-title">Шаг 1. Выберите дату и время прихода</div>
    <div class="datetime-picker">
        <div class="input-group">
            <label for="booking-date">Дата:</label>
            <input type="date" id="booking-date" required>
        </div>
        <div class="input-group">
            <label for="booking-time">Время (с 11:00 до 00:00, шаг 30 мин):</label>
            <input type="time" id="booking-time" min="11:00" max="23:30" step="1800" required>
        </div>
    </div>

    <!-- ШАГ 2: Интерактивная карта -->
    <div class="step-title">Шаг 2. Выберите свободный стол на схеме</div>
    <div class="hall-schema locked" id="hall-map">
        <button class="table available" id="table-1" data-id="1">1</button>
        <button class="table available" id="table-2" data-id="2">2</button>
        <button class="table available" id="table-3" data-id="3">3</button>
        <button class="table available" id="table-4" data-id="4">4</button>
        <button class="table available" id="table-5" data-id="5">5</button>
        <button class="table available" id="table-6" data-id="6">6</button>
        <button class="table available" id="table-7" data-id="7">7</button>
        <button class="table available" id="table-8" data-id="8">8</button>
        <button class="table available" id="table-9" data-id="9">9</button>
        <button class="table available" id="table-10" data-id="10">10</button>
    </div>

    <!-- ШАГ 3: Заполнение данных -->
    <div class="booking-form" id="booking-form">
        <h3>Оформление брони на Стол №<span id="selected-table-num"></span></h3>
        <div style="display: flex; gap: 15px; margin-bottom: 10px;">
            <div class="input-group">
                <label for="user-name">Ваше имя:</label>
                <input type="text" id="user-name" placeholder="Иван" required>
            </div>
            <div class="input-group">
                <label for="user-phone">Телефон:</label>
                <input type="tel" id="user-phone" placeholder="+7 (999) 999-99-99" required>
            </div>
        </div>
        <button class="submit-btn" id="submit-booking">Подтвердить бронирование</button>
    </div>
</div>

<script>
    // === ВСТАВЬ СЮДА СВОЙ URL ВЕБ-ПРИЛОЖЕНИЯ GOOGLE APPS SCRIPT ===
    const API_URL = 'https://script.google.com/macros/s/ВАШ_URL_ИЗ_GOOGLE_SCRIPT/exec';
    
    let selectedTable = null;

    // Настройка автоматических умных дефолтов по времени при загрузке страницы
    window.addEventListener('DOMContentLoaded', () => {
        const dateInput = document.getElementById('booking-date');
        const timeInput = document.getElementById('booking-time');
        
        const now = new Date();
        let yyyy = now.getFullYear();
        let mm = String(now.getMonth() + 1).padStart(2, '0');
        let dd = String(now.getDate()).padStart(2, '0');
        
        let hours = now.getHours();
        let minutes = now.getMinutes();

        // Округляем минуты к ближайшему будущему получасу
        if (minutes > 0 && minutes <= 30) {
            minutes = 30;
        } else if (minutes > 30) {
            minutes = 0;
            hours += 1;
        }

        // Если ресторан на сегодня уже закрыт или закрывается (после 23:30) — ставим на завтра на 11:00
        if (hours >= 24 || (hours === 23 && minutes > 30)) {
            const tomorrow = new Date(now);
            tomorrow.setDate(tomorrow.getDate() + 1);
            yyyy = tomorrow.getFullYear();
            mm = String(tomorrow.getMonth() + 1).padStart(2, '0');
            dd = String(tomorrow.getDate()).padStart(2, '0');
            hours = 11;
            minutes = 0;
        } else if (hours < 11) {
            // Если слишком рано утром — ставим сегодня на открытие (11:00)
            hours = 11;
            minutes = 0;
        }

        const defaultDateStr = `${yyyy}-${mm}-${dd}`;
        const defaultTimeStr = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`;

        // Устанавливаем минимальную дату (прошедшие дни заблокированы)
        dateInput.min = defaultDateStr;
        dateInput.value = defaultDateStr;
        timeInput.value = defaultTimeStr;

        // Сразу запускаем проверку на основе безопасных умных дефолтов
        checkAvailableTables();
    });

    // Функция проверки свободных столов
    async function checkAvailableTables() {
        const dateInput = document.getElementById('booking-date');
        const timeInput = document.getElementById('booking-time');
        const mapContainer = document.getElementById('hall-map');
        
        const date = dateInput.value;
        const time = timeInput.value;

        // Если одно из полей стёрто — блокируем карту и уходим
        if (!date || !time) {
            mapContainer.classList.add('locked');
            return;
        }

        // Валидация: если выбрана сегодняшняя дата, нельзя выбрать прошедшее время
        const today = new Date();
        const todayStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
        
        if (date === todayStr) {
            const currentHour = today.getHours();
            const currentMinute = today.getMinutes();
            const [selectedHour, selectedMinute] = time.split(':').map(Number);
            
            if (selectedHour < currentHour || (selectedHour === currentHour && selectedMinute < currentMinute)) {
                alert('Вы выбрали прошедшее время на сегодня. Пожалуйста, укажите актуальное время.');
                // Сбрасываем к актуальному часу
                let resetHour = currentHour;
                let resetMin = currentMinute > 30 ? 0 : 30;
                if (currentMinute > 30) resetHour += 1;
                timeInput.value = `${String(resetHour).padStart(2, '0')}:${String(resetMin).padStart(2, '0')}`;
                return;
            }
        }

        // Проверка диапазона работы заведения (с 11:00 до 00:00)
        const hour = parseInt(time.split(':')[0], 10);
        if (hour < 11 && hour !== 0) {
            alert('Мы принимаем бронирования только с 11:00 до 00:00.');
            timeInput.value = "11:00";
            return;
        }

        // Сбрасываем визуальные состояния столов
        document.querySelectorAll('.table').forEach(t => {
            t.classList.remove('occupied', 'selected');
            t.classList.add('available');
            t.disabled = false;
        });
        document.getElementById('booking-form').style.display = 'none';
        selectedTable = null;

        // Разблокируем визуально карту для выбора стола
        mapContainer.classList.remove('locked');

        try {
            // Запрос к веб-приложению Google Script
            const response = await fetch(`${API_URL}?date=${date}&time=${time}`);
            const result = await response.json();
            
            if (result.occupiedTables) {
                result.occupiedTables.forEach(tableId => {
                    const tableEl = document.querySelector(`.table[data-id="${tableId}"]`);
                    if (tableEl) {
                        tableEl.classList.remove('available');
                        tableEl.classList.add('occupied');
                        tableEl.disabled = true;
                    }
                });
            }
        } catch (error) {
            console.error('Ошибка получения данных по столам:', error);
        }
    }

    // Слушатели автоматического обновления при изменении даты/времени
    document.getElementById('booking-date').addEventListener('change', checkAvailableTables);
    document.getElementById('booking-time').addEventListener('change', checkAvailableTables);

    // Обработка клика по столу
    document.querySelectorAll('.table').forEach(table => {
        table.addEventListener('click', () => {
            const date = document.getElementById('booking-date').value;
            const time = document.getElementById('booking-time').value;

            // Если время или дата не выбраны, не даём забронировать
            if (!date || !time) {
                alert('Пожалуйста, сначала укажите дату и время вашего визита в Шаге 1.');
                return;
            }

            if (table.classList.contains('occupied')) return;

            document.querySelectorAll('.table').forEach(t => t.classList.remove('selected'));
            table.classList.add('selected');
            
            selectedTable = table.getAttribute('data-id');
            document.getElementById('selected-table-num').innerText = selectedTable;
            
            // Показываем форму данных
            document.getElementById('booking-form').style.display = 'block';
            document.getElementById('booking-form').scrollIntoView({ behavior: 'smooth' });
        });
    });

    // Отправка данных на бронирование
    document.getElementById('submit-booking').addEventListener('click', async () => {
        const date = document.getElementById('booking-date').value;
        const time = document.getElementById('booking-time').value;
        const name = document.getElementById('user-name').value;
        const phone = document.getElementById('user-phone').value;

        if (!date || !time) {
            alert('Пожалуйста, укажите дату и время.');
            return;
        }
        if (!name || !phone) {
            alert('Пожалуйста, заполните Ваше Имя и Телефон.');
            return;
        }

        const payload = {
            date: date,
            time: time,
            table: selectedTable,
            name: name,
            phone: phone
        };

        try {
            await fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            alert(`Успешно! Стол №${selectedTable} забронирован на ${date} в ${time}. Нам в Telegram отправлено уведомление!`);
            location.reload(); 
        } catch (error) {
            console.error('Ошибка создания резерва:', error);
            alert('Не удалось отправить бронирование. Пожалуйста, попробуйте еще раз.');
        }
    });
</script>
</body>
</html>
